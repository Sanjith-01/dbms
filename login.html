<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Login - Smart Waste Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #43a047, #1b5e20, #2196f3, #0d47a1);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
            transform: translateY(0);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h2 {
            color: #1b5e20;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            font-weight: 600;
            position: relative;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background: linear-gradient(to right, #43a047, #1b5e20);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        h2:hover::after {
            width: 100px;
        }

        .role-guide {
            background: rgba(67, 160, 71, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .role-guide label {
            display: inline-flex;
            align-items: center;
            margin: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .role-guide label:hover {
            transform: translateX(5px);
            background: rgba(67,160,71,0.08);
        }

        .role-guide input[type="radio"] {
            margin-right: 8px;
            accent-color: #43a047;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        form label {
            color: #333;
            font-weight: 500;
        }

        form input[type="text"], 
        form input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        form input[type="text"]:focus, 
        form input[type="password"]:focus {
            border-color: #43a047;
            box-shadow: 0 0 0 3px rgba(67, 160, 71, 0.2);
            outline: none;
        }

        .credential-note {
            font-size: 0.9em;
            color: #666;
            text-align: center;
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
            background: rgba(33, 150, 243, 0.1);
        }

        button[type="submit"] {
            background: linear-gradient(45deg, #43a047, #1b5e20);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button[type="submit"]::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: 0.5s;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(27, 94, 32, 0.4);
        }

        button[type="submit"]:hover::before {
            left: 100%;
        }

        ul.messages {
            list-style: none;
            margin-bottom: 20px;
        }

        ul.messages li {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-10px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        ul.messages li.danger {
            background: rgba(244, 67, 54, 0.1);
            color: #d32f2f;
            border-left: 4px solid #d32f2f;
        }

        ul.messages li.success {
            background: rgba(76, 175, 80, 0.1);
            color: #388e3c;
            border-left: 4px solid #388e3c;
        }

        @media (max-width: 400px) {
            .login-container {
                padding: 20px;
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Welcome Back</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <ul class="messages">
                    {% for category, message in messages %}
                        <li class="{{ category }}">{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        <div class="role-guide">
            <label><input type="radio" name="role" value="admin" checked> Admin</label>
            <label><input type="radio" name="role" value="manager"> Manager</label>
            <label><input type="radio" name="role" value="driver"> Driver</label>
        </div>

        <form method="POST">
            <div>
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="off">
            </div>
            
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <div class="credential-note">
            Please enter your credentials to access the system
        </div>
    </div>
</body>
</html>
